<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <!-- daisyUI + tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font - geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- fontawesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
        html {
            background-color: #e9e9e9;
        }
    </style>

</head>
<body>

    <!-- navbar  -->
<!-- Mobile Nav -->
<nav class="flex md:hidden justify-between items-center p-4 bg-white border-b border-[#E9E9E9] shadow-md">
    <div class="flex items-center gap-1.5">
        <img src="assets/github-logo.png" alt="" class="w-9 h-9">
        <h2 class="font-semibold text-lg">GitHub Issues Tracker</h2>
    </div>
    
    <div class="flex items-center gap-4">
        <button class="btn btn-ghost btn-sm">
            <i class="fa-solid fa-magnifying-glass text-xl"></i>
        </button>
        <button class="btn btn-ghost btn-sm">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
    </div>
</nav>

<!-- Desktop Nav  -->
<nav class="hidden md:flex justify-between items-center p-4 bg-white border-b border-[#E9E9E9] shadow-md">
    <div class="flex items-center gap-1.5">
        <img src="assets/github-logo.png" alt="" class="w-9 h-9">
        <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
    </div>

    <div class="flex items-center gap-4">
        <input type="text" placeholder="Search issues..." class="input w-64" />
        <button class="btn bg-[#4A00FF] text-white">
            <i class="fa-solid fa-plus"></i>New Issue
        </button>
    </div>
</nav>

    <!-- all items -->
<section class="mx-4 md:mx-16 lg:mx-32 xl:mx-61 my-6 md:my-15 flex flex-col gap-4 bg-[#E9E9E9]">
    <!-- btns to switch -->
    <div class="bg-white flex flex-col sm:flex-row gap-2 p-4 md:p-6 rounded-lg shadow-md">
        <button class="btn bg-white text-gray-600 rounded-sm font-medium w-full sm:w-30 h-10 hover:bg-gray-50 transition-colors" id="all-btn">All</button>
        <button class="btn bg-white text-gray-600 rounded-sm font-medium w-full sm:w-30 h-10 hover:bg-gray-50 transition-colors" id="open-btn">Open</button>
        <button class="btn bg-white text-gray-600 rounded-sm font-medium w-full sm:w-30 h-10 hover:bg-gray-50 transition-colors" id="closed-btn">Closed</button>
    </div>

<div class="flex flex-col">
    <!-- status of items -->
    <div class="bg-white p-4 md:p-6 rounded-t-lg flex flex-col lg:flex-row gap-4 lg:justify-between lg:items-center shadow-lg border-b-gray-500">
        
        <div class="status-left flex gap-3 items-start">
            <div class="w-[50px] h-[50px] flex-shrink-0 min-w-[50px] min-h-[50px]">
                <img src="assets/Aperture.png" alt="Issues icon" class="w-full h-full object-contain">
            </div>
            
            <div class="flex flex-col min-w-0 flex-1">
                <h3 class="font-semibold text-lg md:text-[20px]"><span id="lenofCards">50</span> Issues</h3>
                <p class="text-gray-600 text-sm md:text-base truncate">Track and manage your project issues</p>
            </div>
        </div> 
        
        <div class="status-right flex flex-col sm:flex-row items-start sm:items-center gap-3 md:gap-4 mt-2 lg:mt-0">
            <div class="open-icon flex gap-2 items-center">
                <img src="assets/Open-Status.png" alt="Open status" class="w-5 h-5 md:w-6 md:h-6 flex-shrink-0">
                <p class="font-medium text-sm md:text-base">Open</p>
            </div>

            <div class="close-icon flex gap-2 items-center">
                <img src="assets/Closed- Status .png" alt="Closed status" class="w-5 h-5 md:w-6 md:h-6 flex-shrink-0">
                <p class="font-medium text-sm md:text-base">Close</p>
            </div>
        </div>     
    </div>

    <div class="cards bg-[#FBFBFB] p-6 rounded-b-lg grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 shadow-sm" id="cards">

    </div>
</div>


</section>

    <script src="js/all.js"></script>

</body> 
</html>
