<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <!-- daisyUI + tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font - geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">


    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>
<body class="flex items-center justify-center min-h-screen p-4 bg-[#F8FAFC]">

    <!-- form -->
    <section class="form flex flex-col items-center gap-6 w-full max-w-md bg-white p-8 rounded-md">

        <div class="space-y-6">
            <img src="assets/github-logo.png" alt="" class="w-24 h-24 mx-auto">

            <div class="form-title text-center">
                <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
                <p class="text-gray-500 text-base">Sign in to manage your issues</p>
            </div>
        </div>

        <div class="flex flex-col w-full gap-4">
            <div class="username-input">
                <label class="label font-medium text-black mb-2">Username</label>

                <input type="email" id="username-input" class="input w-full" placeholder="Enter Username" />

                <p class="text-purple-700 text-sm mt-1">Default: admin</p>
            </div>

            <div class="password-input">
                <label class="label font-medium text-black mb-2">Password</label>

                <input type="password" id="password-input" class="input w-full" placeholder="Enter Password" />

                <p class="text-purple-700 text-sm mt-1">Default: admin123</p>    
            </div>
        </div>

        <button class="btn w-full bg-[#4A00FF] text-white rounded-lg" id="signin-btn">Sign in</button>

        <div class="flex items-center w-full gap-4">
            <hr class="flex-1 border-gray-300">
            <p class="">OR</p>
            <hr class="flex-1 border-gray-300">
        </div>

        <div class="space-y-2 w-full text-center">
            <p class="text-gray-500 text-[14px]">Demo Credentials:</p>
            <div class="info bg-slate-50 w-full p-6 rounded-lg">
                <p><b>Username:</b> admin</p>
                <p><b>Password:</b> admin123</p>
            </div>
        </div>
    </section>
    

    <script src="./js/signin.js"></script>
</body>
</html>
